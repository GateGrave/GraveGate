name: Main Gate

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  merge_group:

jobs:
  gate-main:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.12.2
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run command definitions gate
        run: node apps/gateway/src/testing/commandDefinitions.test.js

      - name: Run command mapper gate
        run: node apps/gateway/src/testing/commandEventMapper.test.js

      - name: Run map-system gate
        run: node apps/map-system/src/testing/mapSystem.test.js

      - name: Run gateway integration gate
        run: node apps/gateway/src/testing/gatewayRuntimeIntegration.test.js

      - name: Run runtime gate
        run: node apps/runtime/src/testing/readCommandRuntime.test.js

      - name: Run combat gate
        run: node apps/combat-system/src/testing/processCombatActionRequest.test.js
